<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유잼킹 규칙 자판기</title>
  <style>
    :root{--hot:#ff4f9d;--ink:#362641;--shadow:0 28px 80px rgba(40,20,55,.35)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#fff1fb,#edfaff);font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;color:var(--ink)}
    .app{position:relative;width:min(100vw,1448px);aspect-ratio:1448/1086;overflow:hidden;background:#ffe8f6;box-shadow:0 30px 90px rgba(92,58,115,.22)}
    .mockup{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;user-select:none;pointer-events:none}.fallback{position:absolute;inset:0;display:grid;place-items:center;padding:28px;text-align:center;background:radial-gradient(circle at 15% 15%,rgba(255,127,189,.3),transparent 28%),radial-gradient(circle at 85% 20%,rgba(134,202,255,.3),transparent 28%),linear-gradient(135deg,#fff3fb,#ecfbff);color:#6e5b7c;font-weight:900;line-height:1.6}.fallback strong{display:block;color:var(--hot);font-size:clamp(28px,5vw,60px);margin-bottom:12px}.app.has-image .fallback{display:none}
    .hotspot{position:absolute;border:0;background:rgba(255,255,255,0);cursor:pointer;border-radius:999px;transition:.15s ease}.hotspot:hover{background:rgba(255,255,255,.16);box-shadow:0 0 0 4px rgba(255,255,255,.2)}
    .btn-fun{left:26.5%;top:75.5%;width:9.5%;height:9%}.btn-challenge{left:37.2%;top:75.5%;width:9.5%;height:9%}.btn-penalty{left:47.8%;top:75.5%;width:9.5%;height:9%}.btn-imagine{left:58.2%;top:75.5%;width:9.5%;height:9%}.btn-etc{left:68.7%;top:75.5%;width:9.5%;height:9%}.lever{left:81.2%;top:63%;width:5.2%;height:20%;border-radius:22px}
    .modal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(35,26,45,.62);backdrop-filter:blur(5px);z-index:5;padding:24px}.modal.show{display:flex}.popup{position:relative;width:min(40vw,560px);min-width:300px;aspect-ratio:1/1.05;border-radius:28px;background:#fff;box-shadow:var(--shadow);display:grid;place-items:center;overflow:hidden}.popup::before{content:"✨ 💖 ⭐ ✨";position:absolute;inset:0;display:grid;place-items:center;font-size:64px;letter-spacing:22px;color:rgba(255,95,168,.18);transform:rotate(-14deg)}
    .close{position:absolute;right:14px;top:14px;z-index:3;width:42px;height:42px;border:0;border-radius:50%;background:#fff;color:#4d405e;font-size:28px;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(80,50,100,.15)}
    .can{position:relative;z-index:2;width:47%;min-width:170px;aspect-ratio:2/3;border-radius:26% 26% 20% 20%;background:linear-gradient(110deg,#ff5fa8 0%,#ff96c9 28%,#ff4f9d 58%,#ffb3d8 100%);border:7px solid rgba(255,255,255,.8);box-shadow:inset 22px 0 24px rgba(255,255,255,.34),inset -18px 0 24px rgba(155,25,93,.14),0 24px 36px rgba(255,95,168,.28);display:grid;place-items:center;text-align:center;color:#fff}.can::before{content:"";position:absolute;top:-5%;left:10%;right:10%;height:13%;border-radius:50%;background:linear-gradient(180deg,#f7f7f7,#aeb0b8);border:5px solid #fff;box-shadow:inset 0 8px 12px rgba(0,0,0,.18)}.can::after{content:"";position:absolute;inset:12% 11%;border-radius:24%;background:radial-gradient(circle at 26% 20%,rgba(255,255,255,.48) 0 7%,transparent 8%),radial-gradient(circle at 70% 70%,rgba(255,255,255,.25) 0 9%,transparent 10%);border:3px solid rgba(255,255,255,.34)}
    .can-content{position:relative;z-index:2}.label{font-size:clamp(28px,3vw,42px);font-weight:1000;text-shadow:2px 2px 0 rgba(155,25,93,.18)}.number{font-size:clamp(84px,10vw,140px);line-height:.9;font-weight:1000;text-shadow:4px 4px 0 rgba(155,25,93,.18)}.ribbon{display:inline-block;margin-top:14px;padding:8px 16px;border-radius:999px;background:#fff;color:var(--hot);font-size:clamp(13px,1.3vw,17px);font-weight:1000;box-shadow:0 8px 16px rgba(155,25,93,.15)}
    .mission-name{position:absolute;bottom:28px;left:20px;right:20px;z-index:2;text-align:center;color:var(--hot);font-weight:1000;font-size:clamp(18px,2.2vw,28px)}.notice{position:absolute;left:2%;bottom:2%;z-index:4;max-width:480px;padding:10px 14px;border-radius:16px;background:rgba(255,255,255,.82);color:#6e5b7c;font-size:13px;font-weight:800;box-shadow:0 10px 24px rgba(80,50,100,.14)}
    @media(max-width:720px){.app{width:100vw;height:100vh;aspect-ratio:auto}.mockup{object-fit:cover}.popup{width:min(88vw,460px)}.notice{font-size:12px;right:2%}}
  </style>
</head>
<body>
  <main class="app" id="app">
    <img class="mockup" id="mockup" src="kawaii_rule_vending_machine_interface.png" alt="유잼킹 규칙 자판기 디자인" />
    <div class="fallback"><div><strong>이미지 파일이 필요합니다</strong>HTML 파일과 같은 폴더에 <b>kawaii_rule_vending_machine_interface.png</b>를 넣어주세요.</div></div>
    <button class="hotspot btn-fun" type="button" aria-label="재미 규칙 뽑기" data-mode="fun"></button><button class="hotspot btn-challenge" type="button" aria-label="도전 규칙 뽑기" data-mode="challenge"></button><button class="hotspot btn-penalty" type="button" aria-label="벌칙 규칙 뽑기" data-mode="penalty"></button><button class="hotspot btn-imagine" type="button" aria-label="상상 규칙 뽑기" data-mode="imagine"></button><button class="hotspot btn-etc" type="button" aria-label="기타 규칙 뽑기" data-mode="etc"></button><button class="hotspot lever" type="button" aria-label="레버로 규칙 뽑기" data-mode="lever"></button>
    <div class="notice">이미지 기반 버전입니다. 디자인은 이미지가 담당하고, 투명 버튼과 결과 팝업만 HTML이 담당합니다.</div>
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="뽑힌 규칙 캔"><div class="popup"><button class="close" id="closeBtn" type="button" aria-label="닫기">×</button><div class="can" id="can"><div class="can-content"><div class="label">규칙</div><div class="number" id="number">07</div><div class="ribbon">오늘의 꿀잼 규칙!</div></div></div><div class="mission-name" id="missionName">욕 금지 5분</div></div></div>
  </main>
  <script>
    const app=document.getElementById('app'),mockup=document.getElementById('mockup'),modal=document.getElementById('modal'),closeBtn=document.getElementById('closeBtn'),number=document.getElementById('number'),missionName=document.getElementById('missionName'),can=document.getElementById('can');
    mockup.addEventListener('load',()=>app.classList.add('has-image')); mockup.addEventListener('error',()=>app.classList.remove('has-image'));
    const missions=[{no:'01',title:'꽝, 유잼킹 생존',color:'linear-gradient(110deg,#ff5fa8 0%,#ff96c9 28%,#ff4f9d 58%,#ffb3d8 100%)'},{no:'02',title:'물 한 모금',color:'linear-gradient(110deg,#55cde9 0%,#81a8ff 45%,#9ad8ff 100%)'},{no:'03',title:'3분 존댓말 모드',color:'linear-gradient(110deg,#62d6c7 0%,#8fe7ff 48%,#55bccc 100%)'},{no:'04',title:'3분 사서 모드',color:'linear-gradient(110deg,#79d88e 0%,#d6f27b 50%,#80ca62 100%)'},{no:'05',title:'주캐 금지 1판',color:'linear-gradient(110deg,#ffc44e 0%,#ff8e6b 55%,#ffcc80 100%)'},{no:'06',title:'랜덤 영웅 1판',color:'linear-gradient(110deg,#55cde9 0%,#81a8ff 45%,#9ad8ff 100%)'},{no:'07',title:'욕 금지 5분',color:'linear-gradient(110deg,#ff5fa8 0%,#ff96c9 28%,#ff4f9d 58%,#ffb3d8 100%)'},{no:'08',title:'죽을 때마다 사과',color:'linear-gradient(110deg,#9d7bff 0%,#d18cff 48%,#bba2ff 100%)'},{no:'09',title:'상대 칭찬 1판',color:'linear-gradient(110deg,#ffc44e 0%,#ff8e6b 55%,#ffcc80 100%)'},{no:'10',title:'궁극기 허가제',color:'linear-gradient(110deg,#9d7bff 0%,#d18cff 48%,#bba2ff 100%)'},{no:'11',title:'채팅 후보 3개 중 선택',color:'linear-gradient(110deg,#62d6c7 0%,#8fe7ff 48%,#55bccc 100%)'},{no:'12',title:'오늘의 칭호 하사',color:'linear-gradient(110deg,#9d7bff 0%,#d18cff 48%,#bba2ff 100%)'},{no:'13',title:'닉네임 삼행시',color:'linear-gradient(110deg,#ff5fa8 0%,#ff96c9 28%,#ff4f9d 58%,#ffb3d8 100%)'},{no:'14',title:'30초 칭찬 감옥',color:'linear-gradient(110deg,#55cde9 0%,#81a8ff 45%,#9ad8ff 100%)'},{no:'15',title:'감독권 1판',color:'linear-gradient(110deg,#ffc44e 0%,#ff8e6b 55%,#ffcc80 100%)'},{no:'16',title:'공포게임 10분 적립',color:'linear-gradient(110deg,#9d7bff 0%,#d18cff 48%,#bba2ff 100%)'}];
    function pick(){const item=missions[Math.floor(Math.random()*missions.length)];number.textContent=item.no;missionName.textContent=item.title;can.style.background=item.color;modal.classList.add('show')}
    document.querySelectorAll('.hotspot').forEach(btn=>btn.addEventListener('click',pick)); closeBtn.addEventListener('click',()=>modal.classList.remove('show')); modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show')}); window.addEventListener('keydown',e=>{if(e.key==='Escape')modal.classList.remove('show')});
  </script>
</body>
</html>
